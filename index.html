<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Games</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <h1>🎮 Mini Games</h1>
  <p class="sub">Pick a game to play</p>

  <div class="grid">
    <a class="card" href="./memory-game/">
      <span class="icon">🧠</span>
      <span class="name">Memory Match</span>
      <span class="desc">Flip cards and find all the matching pairs.</span>
    </a>
    <a class="card" href="./mystery-boxes/">
      <span class="icon">🎁</span>
      <span class="name">Mystery Boxes</span>
      <span class="desc">Pick a gift box and reveal your prize.</span>
    </a>
    <a class="card" href="./loot-catcher/">
      <span class="icon">🧺</span>
      <span class="name">Loot Catcher</span>
      <span class="desc">Catch falling rewards, dodge the bombs.</span>
    </a>
    <a class="card" href="./match-3/">
      <span class="icon">💎</span>
      <span class="name">Match 3</span>
      <span class="desc">Swap gems to line up three or more.</span>
    </a>
  </div>
</body>

</html>
